name: Publish to GitHub Packages

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@sun-asterisk-internal'

      - name: Install dependencies
        run: npm ci

      - name: Verify GitHub Packages auth
        run: npm whoami --registry=https://npm.pkg.github.com
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Check if version already published
        id: version_check
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on GitHub Packages. Skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Publish to GitHub Packages
        if: steps.version_check.outputs.already_published != 'true'
        run: npm publish
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Skip publish (version already exists)
        if: steps.version_check.outputs.already_published == 'true'
        run: echo "No publish performed because this version already exists. Bump version in package.json to publish a new release."
